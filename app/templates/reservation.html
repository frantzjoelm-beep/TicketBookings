<h2>Réserver un ticket</h2>

<form method="POST">

    <input type="text"
           name="evenement"
           placeholder="Nom de l'événement"
           required>

    <input type="date"
           name="date_evenement"
           required>

    <input type="number"
           name="nombre_places"
           min="1"
           required>

    <button type="submit">
        Réserver
    </button>

</form>
